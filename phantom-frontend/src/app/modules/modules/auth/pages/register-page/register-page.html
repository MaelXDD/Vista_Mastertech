<!-- src/app/modules/modules/auth/pages/register-page/register-page.html -->
<div class="container d-flex justify-content-center align-items-center py-5">
  <div class="card shadow p-4" style="width: 100%; max-width: 520px;">

    <h2 class="text-center mb-4">Crear Cuenta</h2>

    @if (success()) {
      <div class="alert alert-success text-center">
        ¡Registro exitoso! Redirigiendo al login...
      </div>
    }

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    @if (!success()) {
      <form (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label class="form-label">Nombre completo *</label>
          <input type="text" class="form-control" [(ngModel)]="form.nombre"
                 name="nombre" required placeholder="Juan Pérez" />
        </div>

        <div class="mb-3">
          <label class="form-label">Correo electrónico *</label>
          <input type="email" class="form-control" [(ngModel)]="form.email"
                 name="email" required placeholder="tu@correo.com" />
        </div>

        <div class="row">
          <div class="col mb-3">
            <label class="form-label">Contraseña *</label>
            <input type="password" class="form-control" [(ngModel)]="form.password"
                   name="password" required placeholder="••••••••" />
          </div>
          <div class="col mb-3">
            <label class="form-label">Confirmar contraseña *</label>
            <input type="password" class="form-control" [(ngModel)]="form.confirmPassword"
                   name="confirmPassword" required placeholder="••••••••" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">DNI (8 dígitos)</label>
          <input type="text" class="form-control" [(ngModel)]="form.dni"
                 name="dni" maxlength="8" placeholder="12345678" />
        </div>

        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input type="text" class="form-control" [(ngModel)]="form.numeroTelefono"
                 name="numeroTelefono" placeholder="987654321" />
        </div>

        <div class="mb-3">
          <label class="form-label">Dirección</label>
          <input type="text" class="form-control" [(ngModel)]="form.direccion"
                 name="direccion" placeholder="Av. Lima 123" />
        </div>

        <button type="submit" class="btn btn-success w-100" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>Registrando...
          } @else {
            Crear cuenta
          }
        </button>

      </form>
    }

    <hr />
    <p class="text-center mb-0">
      ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
    </p>

  </div>
</div>
